apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  workspaces:
    - name: shared-workspace
  tasks:
    - name: npminstall-and-tests
      taskRef:
        name: npm-install-and-test
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: build
      runAfter:
        - npminstall-and-tests
      taskRef:
        name: buildah
      workspaces:
        - name: source
          workspace: shared-workspace

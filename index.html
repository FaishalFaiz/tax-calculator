<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h1 class="h3 mb-4 text-center text-primary">Interest Rate Calculator</h1>

                        <form id="calculator-form">
                            <div class="mb-3">
                                <label for="principal" class="form-label">Principal Amount ($):</label>
                                <input type="number" id="principal" class="form-control" placeholder="e.g. 1000" required>
                            </div>

                            <div class="mb-3">
                                <label for="rate" class="form-label">Annual Interest Rate (%):</label>
                                <input type="number" id="rate" class="form-control" step="0.1" placeholder="e.g. 5.5" required>
                            </div>

                            <div class="mb-3">
                                <label for="years" class="form-label">Time Period (Years):</label>
                                <input type="number" id="years" class="form-control" placeholder="e.g. 3" required>
                            </div>

                            <button type="button" id="compute-btn" class="btn btn-primary w-full">Calculate Interest</button>
                        </form>

                        <div class="mt-4 p-3 bg-white border rounded d-none" id="result-box">
                            <h2 class="h5 text-secondary">Calculation Result:</h2>
                            <p class="mb-1" id="interest-output"></p>
                            <p class="mb-0 font-bold" id="total-output"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main JavaScript File Alignment -->
    <script src="script.js"></script>
</body>
</html>
